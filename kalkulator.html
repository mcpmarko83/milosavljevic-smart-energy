<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Napredni MSE Kalkulator | Predmjer i Predračun</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: #05070a; color: #f3f4f6; line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-nav { margin-bottom: 40px; display: flex; align-items: center; justify-content: space-between; }
        .btn-back { color: #a1aabf; text-decoration: none; font-weight: 500; }
        .brand-logo { font-size: 18px; font-weight: 600; color: #fff; }
        .brand-logo span { color: #4caf50; }
        .calc-wrapper { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .form-section { background: rgba(20, 24, 32, 0.55); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; margin-bottom: 20px; }
        .form-section-title { font-size: 18px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .form-group label { display: block; font-size: 13px; color: #a1aabf; margin-bottom: 8px; }
        .form-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: #fff; }
        .receipt-panel { background: rgba(10, 14, 22, 0.9); border: 1px solid #4caf50; border-radius: 24px; padding: 30px; position: sticky; top: 20px; }
        .receipt-item { display: flex; justify-content: space-between; font-size: 13px; color: #a1aabf; margin-bottom: 8px; }
        .receipt-grand-total { font-size: 24px; color: #4caf50; font-weight: 700; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #4caf50; display: flex; justify-content: space-between; }
        .ai-action-btn { background: #4caf50; color: #fff; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="back-nav">
        <a href="index.html" class="btn-back">← Nazad na početnu</a>
        <div class="brand-logo">MILOSAVLJEVIĆ <span>SMART ENERGY</span></div>
    </div>

    <div class="calc-wrapper">
        <div class="inputs-panel">
            <div class="form-section">
                <div class="form-section-title">Osnovni parametri objekta</div>
                <div class="input-grid">
                    <div class="form-group"><label>Površina (m²)</label><input type="number" id="obj_area" class="form-control" value="80" oninput="calculate()"></div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Kabliranje (Dužni metri - m)</div>
                <div class="input-grid">
                    <div class="form-group"><label>Kabl 3x1.5 (m)</label><input type="number" id="cab_3x15" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Kabl 3x2.5 (m)</label><input type="number" id="cab_3x25" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Kabl 5x2.5 (m)</label><input type="number" id="cab_5x25" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>UTP Mrežni (m)</label><input type="number" id="cab_utp" class="form-control" value="0" oninput="calculate()"></div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Fina montaža (po komadu - 35 KM usluga)</div>
                <div class="input-grid">
                    <div class="form-group"><label>Šuko utičnice (kom)</label><input type="number" id="fin_suko" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Trofazne utičnice (kom)</label><input type="number" id="fin_3f" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Prekidači (kom)</label><input type="number" id="fin_prek" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Mrežne utičnice RJ45 (kom)</label><input type="number" id="fin_rj45" class="form-control" value="0" oninput="calculate()"></div>
                    <div class="form-group"><label>Lampa/Sijalično mjesto (kom)</label><input type="number" id="fin_lampe" class="form-control" value="0" oninput="calculate()"></div>
                </div>
            </div>
        </div>

        <div class="receipt-panel">
            <div class="receipt-header">Specifikacija troškova</div>
            <div id="receipt-content"></div>
            <div class="receipt-grand-total"><span>TOTAL:</span><span id="grand-total">0.00 KM</span></div>
            <button class="ai-action-btn" onclick="exportToForm()">Kopiraj u kontakt formu</button>
        </div>
    </div>
</div>

<script>
    const PRICES = {
        cab_3x15: { mat: 1.5, lab: 1.5, name: "Kabl 3x1.5 (m)" },
        cab_3x25: { mat: 2.5, lab: 1.5, name: "Kabl 3x2.5 (m)" },
        cab_5x25: { mat: 4.5, lab: 2.0, name: "Kabl 5x2.5 (m)" },
        cab_utp: { mat: 1.8, lab: 1.2, name: "UTP Kabl (m)" },
        fin_suko: { mat: 15, lab: 35, name: "Šuko utičnica (kom)" },
        fin_3f: { mat: 30, lab: 35, name: "Trofazna utičnica (kom)" },
        fin_prek: { mat: 12, lab: 35, name: "Prekidač (kom)" },
        fin_rj45: { mat: 20, lab: 35, name: "Mrežna utičnica (kom)" },
        fin_lampe: { mat: 0, lab: 35, name: "Montaža lampe (kom)" }
    };

    function calculate() {
        let html = "";
        let grandTotal = 0;

        Object.keys(PRICES).forEach(key => {
            let qty = parseFloat(document.getElementById(key).value) || 0;
            if (qty > 0) {
                let cost = qty * (PRICES[key].mat + PRICES[key].lab);
                grandTotal += cost;
                html += `<div class="receipt-item"><span>${qty}x ${PRICES[key].name}</span><span>${cost.toFixed(2)} KM</span></div>`;
            }
        });

        document.getElementById('receipt-content').innerHTML = html;
        document.getElementById('grand-total').innerText = grandTotal.toFixed(2) + " KM";
    }

    function exportToForm() {
        // Logika za kopiranje kao u prethodnoj verziji
        alert("Specifikacija kopirana. Preusmjeravanje na kontakt formu...");
        window.location.href = 'index.html#kontakt';
    }
    
    window.onload = calculate;
</script>
</body>
</html>
