<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>

    <style>
        /* ==========================
           BASE RESET + PERFORMANCE
        ========================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #04070b;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Reduce motion for mobile performance */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* ==========================
           TYPOGRAPHY
        ========================== */
        .neon-text {
            color: #fff;
            text-shadow: 0 0 12px rgba(76,175,80,.35);
        }

        /* ==========================
           LAYOUT HELPERS
        ========================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        /* FIXED RESPONSIVE GRID */
        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* ==========================
           HEADER
        ========================== */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10,15,24,.75);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,.06);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }

        /* ==========================
           HERO
        ========================== */
        .hero {
            text-align: center;
            padding: 70px 0 50px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 999px;
            background: linear-gradient(135deg,#2e7d32,#4caf50);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 6px 25px rgba(76,175,80,.25);
        }

        /* ==========================
           CARDS (OPTIMIZED)
        ========================== */
        .card {
            background: rgba(13,20,30,.7);
            border: 1px solid rgba(255,255,255,.05);
            border-radius: 14px;
            padding: 22px;
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-3px);
            transition: transform .25s ease;
        }

        /* ==========================
           FOLDERS (OPTIMIZED)
        ========================== */
        .folder {
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(10,15,20,.6);
        }

        .folder-header {
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .folder-content {
            display: none;
            padding: 14px;
        }

        .folder.open .folder-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
        }

        .folder.open {
            border-color: #4caf50;
        }

        /* ==========================
           IMAGES
        ========================== */
        .project-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* ==========================
           FORM
        ========================== */
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(0,0,0,.3);
            color: #fff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg,#2e7d32,#4caf50);
            color: #fff;
            font-weight: 600;
        }

        /* ==========================
           LIGHTBOX (SIMPLIFIED)
        ========================== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.95);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
        }

        .lightbox.active {
            display: flex;
        }

        /* ==========================
           MOBILE OPTIMIZATION
        ========================== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<audio id="bg-music" src="Muzika.mp3" loop></audio>

<div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" />
</div>

<header>
    <div class="header-inner container">
        <div>Smart Energy</div>
        <button id="music-toggle">🔊 Music</button>
    </div>
</header>

<div class="container">

    <section class="hero">
        <h1 class="neon-text">Inženjerska tradicija za pametnu budućnost</h1>
        <p>Elektroinstalacije, automatizacija i robotika</p>
        <a class="btn" href="#kontakt">Kontakt</a>
    </section>

    <section class="grid grid-2">
        <div class="card">
            <h3>Sigurnost</h3>
            <p>Nevidljiva energija zahtijeva disciplinu i proceduru.</p>
        </div>
        <div class="card">
            <h3>Preciznost</h3>
            <p>Uredan ormar znači stabilan sistem.</p>
        </div>
    </section>

    <section style="margin-top:30px;">
        <div class="folder" onclick="toggleFolder(this)">
            <div class="folder-header">
                <span>📁 Projekti</span>
                <span>▶</span>
            </div>
            <div class="folder-content">
                <img class="project-img" src="img1.jpg" />
                <img class="project-img" src="img2.jpg" />
                <img class="project-img" src="img3.jpg" />
                <img class="project-img" src="img4.jpg" />
            </div>
        </div>
    </section>

    <section id="kontakt" style="margin-top:40px;">
        <h2>Kontakt</h2>
        <form id="form">
            <input placeholder="Ime" required />
            <input placeholder="Telefon" required />
            <input placeholder="Email" type="email" required />
            <textarea placeholder="Poruka" required></textarea>
            <button>Pošalji</button>
        </form>
    </section>

</div>

<script>
const music = document.getElementById('bg-music');
const toggle = document.getElementById('music-toggle');

let started = false;

function playMusic(){
    if(!started){
        music.play().catch(()=>{});
        started = true;
    }
}

document.addEventListener('click', playMusic, {once:true});

toggle.onclick = () => {
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
};

function toggleFolder(el){
    el.classList.toggle('open');
}

const lightbox = document.getElementById('lightbox');
const imgBox = document.getElementById('lightbox-img');

document.querySelectorAll('.project-img').forEach(img=>{
    img.onclick = () => {
        imgBox.src = img.src;
        lightbox.classList.add('active');
    }
});

lightbox.onclick = () => lightbox.classList.remove('active');

</script>

</body>
</html>
