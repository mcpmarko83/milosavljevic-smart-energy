<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" src="Muzika.mp3" loop></audio>

    <div id="lightbox" class="lightbox-overlay">
        <span class="lightbox-close" id="close-btn">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Uvećan prikaz">
    </div>

    <header style="background-color: rgba(10, 15, 24, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 14px 24px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 4px 30px rgba(0,0,0,0.4);">
        <div style="max-width:1400px; margin:0 auto; display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;">
            <div style="justify-self: start;">
                <p style="margin:0; font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:2px; font-weight:600;" class="hide-mobile">Tradicija od 1998.</p>
            </div>
            <div style="display:flex; align-items:center; gap:14px; justify-self: center;">
                <img src="logo.jpg" alt="Milosavljević Logo" style="height:38px; width:auto; mix-blend-mode: screen; filter: brightness(1.15);">
                <h2 style="margin:0; font-size:16px; color:#ffffff; letter-spacing:1.5px; font-weight: 700; text-transform: uppercase;">
                    MILOSAVLJEVIĆ <span style="color:#4caf50;">SMART ENERGY</span>
                </h2>
            </div>
            <div style="justify-self: end;">
                <button id="music-toggle" class="music-btn">
                    <span id="music-icon">🔊</span> <span id="music-text" class="hide-mobile">Muzika: Isključena</span>
                </button>
            </div>
        </div>
    </header>

    <div style="max-width:1200px; margin:0 auto; padding:0 20px;">
        </div>

    <script src="script.js"></script>
</body>
</html>
