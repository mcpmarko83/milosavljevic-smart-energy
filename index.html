<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: #04070b; color: #f3f4f6; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; overflow-x: hidden; }
        
        /* Apstraktni neonski stil */
        .neon-text { color: #ffffff; text-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        .abstract-card { background: linear-gradient(150deg, rgba(13, 20, 30, 0.8) 0%, rgba(7, 10, 15, 1) 100%); border: 1px solid rgba(76, 175, 80, 0.1); border-radius: 20px; padding: 30px; transition: all 0.4s ease; }
        .abstract-card:hover { border-color: rgba(76, 175, 80, 0.5); box-shadow: 0 0 20px rgba(76, 175, 80, 0.1); }
        
        /* Folderi - Apstraktni dizajn */
        .folder-box { background: rgba(10, 15, 25, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; transition: 0.3s; }
        .folder-box:hover { border-color: rgba(76, 175, 80, 0.3); }
        .folder-arrow { transition: 0.3s; color: #4caf50; font-size: 20px; }
        .folder-box.open .folder-arrow { transform: rotate(90deg); }
        .folder-content { display: grid; grid-template-rows: 0fr; transition: 0.4s; opacity: 0; }
        .folder-box.open .folder-content { grid-template-rows: 1fr; opacity: 1; margin-top: 20px; }
        
        .project-img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        .form-control { width: 100%; background: rgba(20, 30, 45, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; color: white; margin-bottom: 15px; }
        .form-submit-btn { width: 100%; background: #4caf50; border: none; padding: 15px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
        .status-box { display: none; background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; padding: 20px; border-radius: 12px; color: #4caf50; }

        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .lightbox-img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid #4caf50; }
    </style>
</head>
<body>

    <div id="lightbox" class="lightbox-overlay"><img id="lightbox-img" class="lightbox-img"></div>

    <div style="max-width:1000px; margin:0 auto; padding: 20px;">
        <header style="text-align:center; padding: 50px 0;">
            <h1 class="neon-text">MILOSAVLJEVIĆ <span style="color:#4caf50;">SMART ENERGY</span></h1>
        </header>

        <!-- FOLDERI (Apstraktni SVG umjesto žutih emojija) -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <div class="folder-box">
                <div onclick="toggleFolder(this.parentNode)" style="display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <h3 style="color:white;">Kućne instalacije</h3>
                    </div>
                    <span class="folder-arrow">▶</span>
                </div>
                <div class="folder-content">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <img src="Nasi projekti/01_Kucne_instalacije/1.jpg" class="project-img">
                        <img src="Nasi projekti/01_Kucne_instalacije/2.jpg" class="project-img">
                    </div>
                </div>
            </div>
        </div>

        <section id="kontakt" style="margin-top:50px;">
            <form id="clean-contact-form" class="abstract-card">
                <h3 id="form-title" style="color:white; margin-bottom:20px;">Pošaljite nam upit direktno sa sajta</h3>
                <input type="text" id="ins_name" class="form-control" placeholder="Ime i prezime" required>
                <input type="tel" id="ins_phone" class="form-control" placeholder="Telefon" required>
                <textarea id="ins_message" class="form-control" rows="4" placeholder="Opis radova" required></textarea>
                <button type="submit" id="submit-btn" class="form-submit-btn">POŠALJI</button>
            </form>
            <div id="status-box" class="status-box">✅ Uspješno poslato!</div>
        </section>
    </div>

    <script>
        function toggleFolder(el) { el.classList.toggle('open'); }
        
        // Android-friendly image fix
        document.querySelectorAll('.project-img').forEach(img => {
            img.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                document.getElementById('lightbox-img').src = this.src;
                document.getElementById('lightbox').style.display = 'flex';
            });
        });
        document.getElementById('lightbox').addEventListener('click', function() { this.style.display = 'none'; });

        document.getElementById('clean-contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('submit-btn').innerText = "Slanje...";
            fetch('https://formsubmit.co/ajax/milosavljevic@outlook.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "Ime": document.getElementById('ins_name').value,
                    "Telefon": document.getElementById('ins_phone').value,
                    "Poruka": document.getElementById('ins_message').value
                })
            }).then(() => {
                document.getElementById('clean-contact-form').style.display = 'none';
                document.getElementById('form-title').innerText = "Informacija pošiljaocu";
                document.getElementById('status-box').style.display = 'block';
            });
        });
    </script>
</body>
</html>
