<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>
    <style>
        /* ==========================================================================
            1. CORE SETTINGS & NEON MATRIX (Reset i Globalni Stilovi)
            ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #04070b;
            color: #f3f4f6;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Animacija: Električne iskre u pozadini */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(76, 175, 80, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
            animation: electricPulse 10s infinite alternate;
        }
        @keyframes electricPulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.1); }
        }

        .neon-text {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(76, 175, 80, 0.5), 0 0 30px rgba(76, 175, 80, 0.2);
        }
        .hide-mobile {
            @media (max-width: 768px) { display: none; }
        }

        /* ==========================================================================
            2. PREMIUM REZULTATI STAPANJA SLIKA
            ========================================================================== */
        .blended-logo {
            max-width: 280px;
            width: 100%;
            height: auto;
            mix-blend-mode: screen;
            filter: brightness(1.1) contrast(1.05) grayscale(20%); /* Blaga siva nota */
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .blended-logo:hover { transform: scale(1.04); filter: grayscale(0%); }
        
        .blended-moto {
            width: 100%;
            height: auto;
            display: block;
            mix-blend-mode: screen;
            filter: brightness(1.15) drop-shadow(0 0 20px rgba(58, 134, 255, 0.25)) grayscale(30%);
        }
        
        .om-image-container {
            position: relative;
            display: inline-block;
            max-width: 280px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(17, 25, 40, 0.4);
            padding: 12px;
            border: 1px solid rgba(76, 175, 80, 0.15);
        }
        .blended-om {
            width: 100%;
            height: auto;
            display: block;
            mix-blend-mode: lighten;
            filter: contrast(1.2) brightness(1.1) grayscale(30%);
        }

        /* ==========================================================================
            3. INTERAKTIVNE KARTICE
            ========================================================================== */
        .grid-philosophie {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .abstract-card {
            background: linear-gradient(135deg, rgba(13, 20, 30, 0.7) 0%, rgba(7, 10, 15, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 35px;
            position: relative;
            backdrop-filter: blur(16px);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .abstract-card.full-width { grid-column: span 2; }
        .abstract-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 5px; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px 0 0 16px;
            transition: background 0.4s ease;
        }
        .abstract-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7); }
        .abstract-card.card-zelena:hover { border-color: #4caf50; }
        .abstract-card.card-zelena:hover::before { background: #4caf50; }

        /* ==========================================================================
            4. FOLDERI I PROJEKTI
            ========================================================================== */
        .folder-box {
            background: rgba(13, 20, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 24px;
            transition: all 0.4s ease;
        }
        .project-img {
            width: 100%;
            height: 95px;
            object-fit: cover;
            border-radius: 6px;
            filter: grayscale(40%); /* Ikone u sivim tonovima */
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-img:hover { filter: grayscale(0%); transform: scale(1.05); }

        /* ==========================================================================
            5. LIGHTBOX (STABILNO PREKO EKRANA)
            ========================================================================== */
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(3, 5, 8, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            touch-action: none;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 20px;
            color: #fff; font-size: 40px; cursor: pointer;
        }

        @media (max-width: 900px) {
            .grid-philosophie { grid-template-columns: 1fr; }
            .abstract-card.full-width { grid-column: auto; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="Muzika.mp3" loop></audio>

    <div id="lightbox" class="lightbox-overlay">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Prikaz">
    </div>

    <header style="background-color: rgba(10, 15, 24, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 14px 24px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(16px);">
        <div style="max-width:1400px; margin:0 auto; display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;">
            <div><p class="hide-mobile" style="font-size:11px; color:#6b7280; text-transform:uppercase;">Tradicija od 1998.</p></div>
            <div style="display:flex; align-items:center; gap:14px; justify-self: center;">
                <img src="logo.jpg" alt="Logo" style="height:38px; mix-blend-mode: screen; filter: grayscale(40%);">
                <h2 style="font-size:16px; color:#fff;">MILOSAVLJEVIĆ <span style="color:#4caf50;">SMART ENERGY</span></h2>
            </div>
            <div style="justify-self: end;">
                <button id="music-toggle" class="music-btn" style="background:none; border:1px solid #4caf50; color:#fff; border-radius:20px; padding:5px 15px; cursor:pointer;">
                    <span id="music-icon">🔇</span> Muzika
                </button>
            </div>
        </div>
    </header>

    <div style="max-width:1200px; margin:0 auto; padding:0 20px;">
        <section style="padding:90px 0; text-align:center;">
            <img src="logo.jpg" alt="Logo" class="blended-logo">
            <h1 class="neon-text" style="font-size:40px; margin:20px 0;">Inženjerska tradicija za <span style="color:#3a86ff;">pametnu budućnost</span></h1>
        </section>

        <section id="kontakt" style="padding:60px 0;">
            <form id="clean-contact-form">
                </form>
            <div id="status-box" class="status-box">✅ Uspešno poslato!</div>
        </section>
    </div>

    <script>
        // Audio logika (Start na bilo koji dodir)
        const music = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        let musicStarted = false;

        function startAudio() {
            if (!musicStarted) {
                music.play().then(() => {
                    musicStarted = true;
                    document.getElementById('music-icon').textContent = "🔊";
                    document.removeEventListener('click', startAudio);
                });
            }
        }
        document.addEventListener('click', startAudio);

        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) { music.play(); document.getElementById('music-icon').textContent = "🔊"; }
            else { music.pause(); document.getElementById('music-icon').textContent = "🔇"; }
        });

        // Lightbox logika
        const lightbox = document.getElementById('lightbox');
        document.querySelectorAll('.project-img').forEach(img => {
            img.onclick = () => {
                document.getElementById('lightbox-img').src = img.src;
                lightbox.classList.add('active');
            }
        });
        lightbox.onclick = () => lightbox.classList.remove('active');

        // Folder toggle
        function toggleFolder(f) { f.classList.toggle('open'); }
    </script>
</body>
</html>
