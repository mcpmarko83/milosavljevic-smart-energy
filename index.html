 <script>
(function() {
    // ========== SCROLL REVEAL ==========
    const revealObserver = new IntersectionObserver(function(entries, obs) {
        entries.forEach(entry => {
            if (entry.isIntersecting) { entry.target.classList.add("active"); obs.unobserve(entry.target); }
        });
    }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
    document.querySelectorAll('.reveal').forEach(el => { revealObserver.observe(el); });

    // ========== INSTAGRAM OTVARANJE FOLDERA ==========
    const folderModal = document.getElementById('folder-modal');
    const modalTitle = document.getElementById('modal-folder-title');
    const modalGrid = document.getElementById('modal-image-grid');
    const closeModalBtn = document.getElementById('close-modal-btn');

    window.openFolderModal = function(folderName, folderPath) {
        modalTitle.innerText = folderName;
        modalGrid.innerHTML = ''; 
        
        for (let i = 1; i <= 4; i++) {
            const img = document.createElement('img');
            img.src = `Nasi projekti/${folderPath}/${i}.jpg`;
            img.className = 'project-img';
            img.loading = 'lazy';
            img.onerror = function() { this.style.display = 'none'; };
            
            img.onclick = function() {
                document.getElementById('lightbox-img').src = this.src;
                document.getElementById('lightbox').classList.add('active');
            };
            modalGrid.appendChild(img);
        }
        folderModal.classList.add('active');
        document.body.style.overflow = 'hidden'; 
    };
    closeModalBtn.onclick = function() {
        folderModal.classList.remove('active');
        document.body.style.overflow = '';
    };

    // ========== MUZIKA ==========
    const music = document.getElementById('bg-music');
    const musicToggleBtn = document.getElementById('music-toggle');
    const musicWaves = document.getElementById('music-waves');
    let musicStarted = false;
    function autoStartMusic() {
        if (musicStarted) return;
        if (music && music.paused) {
            music.play().then(() => {
                musicStarted = true;
                if(musicWaves) musicWaves.style.display = 'block';
                removeMusicListeners();
            }).catch(e => {});
        }
    }
    function removeMusicListeners() {
        ['click', 'touchstart', 'scroll', 'mousemove', 'keydown'].forEach(ev => {
            window.removeEventListener(ev, autoStartMusic);
        });
    }
    ['click', 'touchstart', 'scroll', 'mousemove', 'keydown'].forEach(ev => {
        window.addEventListener(ev, autoStartMusic, {once: true, passive: true});
    });
    function toggleMusic() {
        if (!music) return;
        if (music.paused) {
            music.play().then(() => {
                musicStarted = true;
                if(musicWaves) musicWaves.style.display = 'block';
            }).catch(e => console.log);
        } else {
            music.pause();
            if(musicWaves) musicWaves.style.display = 'none';
        }
    }
    if (musicToggleBtn) musicToggleBtn.addEventListener('click', e => { e.stopPropagation(); toggleMusic(); });

    // ========== VIDEO LIGHTBOX ==========
    const videoTrigger = document.getElementById('video-trigger');
    const videoLightbox = document.getElementById('video-lightbox');
    const videoElement = document.getElementById('intro-video');
    let wasMusicPlaying = false;
    function openVideo() {
        if (music && !music.paused) {
            wasMusicPlaying = true; music.pause();
            if(musicWaves) musicWaves.style.display = 'none';
        } else { wasMusicPlaying = false; }
        videoLightbox.classList.add('active');
        videoElement.currentTime = 0; videoElement.play().catch(e => console.log);
    }
    function closeVideo() {
        videoLightbox.classList.remove('active');
        videoElement.pause();
        if (wasMusicPlaying && music) {
            music.play().then(() => { if(musicWaves) musicWaves.style.display = 'block'; }).catch(e => console.log);
        }
    }
    if (videoTrigger) videoTrigger.addEventListener('click', openVideo);
    document.getElementById('close-video-btn').addEventListener('click', closeVideo);
    if (videoLightbox) videoLightbox.addEventListener('click', e => { if (e.target === videoLightbox) closeVideo(); });

    // ========== HEADER PROGRESS ==========
    const headerPercentBtn = document.getElementById('header-percent-btn');
    const headerProgressBar = document.getElementById('header-progress-bar');
    window.addEventListener('scroll', () => { 
        const st = window.pageYOffset || document.documentElement.scrollTop; 
        const dh = document.documentElement.scrollHeight - window.innerHeight; 
        const p = dh <= 0 ? 0 : Math.min(100, Math.max(0, (st / dh) * 100)); 
        if(headerPercentBtn) headerPercentBtn.textContent = `${Math.round(p)}%`; 
        if(headerProgressBar) headerProgressBar.style.width = `${p}%`;
    }, {passive: true});

    // ========== SLIKE LIGHTBOX ==========
    const lightbox = document.getElementById('lightbox');
    function closeLb() { lightbox.classList.remove('active'); }
    if(lightbox) lightbox.addEventListener('click', e => { if(e.target === lightbox) closeLb(); });
    document.getElementById('close-btn').addEventListener('click', closeLb);

    // ========== KONTAKT FORMA & LOKALNO ČUVANJE PORUKA ==========
    const contactForm = document.getElementById('clean-contact-form');
    const messagesContainer = document.getElementById('real-messages-container');
    function loadLocalMessages() {
        const saved = localStorage.getItem('mse_messages');
        if (saved) {
            const msgs = JSON.parse(saved);
            messagesContainer.innerHTML = '';
            msgs.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'user-message-card';
                card.innerHTML = `<div class="msg-header"><span class="msg-name">${msg.name}</span><span class="msg-time">${msg.time}</span></div><div class="msg-body">"${msg.text}"</div>`;
                messagesContainer.appendChild(card);
            });
        }
    }
    loadLocalMessages();

    if(contactForm) {
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const nameInput = document.getElementById('ins_name').value;
            const msgInput = document.getElementById('ins_message').value;
            const btn = document.getElementById('submit-btn');
            const original = btn.innerHTML;
            btn.innerHTML = "⏳ Slanje u toku..."; btn.disabled = true;
            fetch('https://api.web3forms.com/submit', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_key: 'cc0ac5b2-dae0-4051-86be-94a57cca494e',
                    name: nameInput,
                    email: document.getElementById('ins_email').value,
                    phone: document.getElementById('ins_phone').value,
                    message: msgInput,
                    subject: 'Novi upit sa sajta Milosavljević Smart Energy', _captcha: 'false'
                })
            }).then(res => res.json()).then(data => { 
                if(data.success) { 
                    contactForm.style.display = 'none'; 
                    document.getElementById('form-title').innerText = "Informacija pošiljaocu"; 
                    document.getElementById('status-box').style.display = 'block'; 
                    let savedMsgs = JSON.parse(localStorage.getItem('mse_messages') || '[]');
                    const now = new Date();
                    const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                    savedMsgs.unshift({ name: nameInput, text: msgInput.substring(0, 100) + (msgInput.length > 100 ? '...' : ''), time: 'Danas u ' + timeString });
                    if (savedMsgs.length > 3) savedMsgs.pop(); 
                    localStorage.setItem('mse_messages', JSON.stringify(savedMsgs));
                    loadLocalMessages();
                } else throw new Error('Greška'); 
            }).catch(err => alert("Došlo je do greške prilikom slanja.")).finally(() => { btn.innerHTML = original; btn.disabled = false; });
        });
    }

    // ========== AI CHATBOT – ISPRAVLJEN GEMINI + FALLBACK ==========
    const aiToggleBtn = document.getElementById('ai-chat-toggle');
    const aiChatWidget = document.getElementById('ai-chatbot');
    const aiChatClose = document.getElementById('ai-chat-close');
    const aiInput = document.getElementById('ai-input');
    const aiSend = document.getElementById('ai-send');
    const aiChatBody = document.getElementById('ai-chat-body');

    // ISPRAVAN API KLJUČ (sa snimka)
    const API_KEY = 'AQ.Ab8RN6LGd2ItBJ7gXCtFF05wmNhPsXnr7uKt1NMW2Sgum0RQ0';
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    let aiChatHistory = [];

    aiToggleBtn.addEventListener('click', () => {
        aiChatWidget.classList.add('active');
        aiInput.focus();
    });
    aiChatClose.addEventListener('click', () => {
        aiChatWidget.classList.remove('active');
    });

    function appendMessage(text, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `chatbot-msg ${isUser ? 'msg-user' : 'msg-ai'}`;
        msgDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        aiChatBody.appendChild(msgDiv);
        aiChatBody.scrollTop = aiChatBody.scrollHeight;
    }

    // ---------- FALLBACK odgovori (lokalni, bez API-ja) ----------
    function getFallbackResponse(userMessage) {
        const msg = userMessage.toLowerCase();
        if (msg.includes('cijena') || msg.includes('cijene') || msg.includes('koliko košta')) {
            return "Cijena zavisi od obima posla i specifikacije. Najbolje je da nam pošaljete upit preko kontakt forme ili nas pozovete – napravićemo detaljnu ponudu bez obaveze.";
        }
        if (msg.includes('pametna kuća') || msg.includes('smart home')) {
            return "Za pametne kuće nudimo kompletnu integraciju: upravljanje rasvjetom, roletnama, grijanjem, video nadzorom i robotikom. Radimo sa KNX, Home Assistant, i drugim sistemima. Javite nam se za konsultacije.";
        }
        if (msg.includes('automatizacija') || msg.includes('robotika') || msg.includes('industrijska')) {
            return "Specijalizovani smo za industrijske automatizacije, PLC ormare, robotske ćelije i Industrij 4.0. Imamo iskustva sa velikim proizvodnim sistemima. Detaljno vas možemo posavjetovati na licu mjesta.";
        }
        if (msg.includes('elektroinstalacije') || msg.includes('struja') || msg.includes('provodnici')) {
            return "Elektroinstalacije radimo po najvišim standardima – od projektovanja do izvođenja. Bezbednost je na prvom mjestu. Ugradimo kvalitetne materijale i izdajemo garanciju.";
        }
        if (msg.includes('kontakt') || msg.includes('telefon') || msg.includes('mail')) {
            return "Možete nas kontaktirati na brojeve +387 65 728 595 (Rajko) ili +387 66 921 100 (Marko), putem Viber/WhatsApp, ili nam pisati na milosavljevic@outlook.com.";
        }
        if (msg.includes('iskustvo') || msg.includes('godina') || msg.includes('tradicija')) {
            return "Milosavljević Smart Energy posluje od 1998. godine. U protekle 3 decenije izveli smo stotine projekata – od kućnih instalacija do složenih industrijskih sistema i distributivnih mreža.";
        }
        return "Hvala na pitanju! Naš tim će Vam odgovoriti što prije. Za konkretne informacije o vašem projektu, pozovite nas ili pošaljite upit preko kontakt forme. Tu smo da Vam pomognemo.";
    }

    async function fetchGeminiResponse(userText) {
        appendMessage(userText, true);
        aiInput.value = '';
        aiSend.disabled = true;

        const typingId = 'typing-' + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'chatbot-msg msg-ai';
        typingDiv.id = typingId;
        typingDiv.textContent = 'MSE Asistent razmišlja...';
        aiChatBody.appendChild(typingDiv);
        aiChatBody.scrollTop = aiChatBody.scrollHeight;

        // Čuvamo korisnikovu poruku u istoriju (pravilno formatirano)
        aiChatHistory.push({ role: "user", parts: [{ text: userText }] });

        const requestBody = {
            contents: aiChatHistory,
            system_instruction: {
                parts: [{ text: "Ti si MSE Stručni Asistent za 'Milosavljević Smart Energy' (od 1998). Odgovaraj profesionalno, ljubazno i korisno na pitanja o elektroinstalacijama, pametnim kućama, automatizaciji i robotici." }]
            }
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            const data = await response.json();
            document.getElementById(typingId).remove();

            if (!response.ok) {
                console.error("Gemini API greška:", data);
                // Pad na fallback
                const fallback = getFallbackResponse(userText);
                appendMessage(fallback, false);
                aiChatHistory.push({ role: "model", parts: [{ text: fallback }] });
                return;
            }

            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                const aiReply = data.candidates[0].content.parts[0].text;
                appendMessage(aiReply, false);
                aiChatHistory.push({ role: "model", parts: [{ text: aiReply }] });
            } else {
                throw new Error("Nepoznat odgovor API-ja");
            }
        } catch (error) {
            console.error("Mrežna ili parserska greška:", error);
            document.getElementById(typingId).remove();
            const fallback = getFallbackResponse(userText);
            appendMessage(fallback, false);
            aiChatHistory.push({ role: "model", parts: [{ text: fallback }] });
        } finally {
            aiSend.disabled = false;
            aiInput.focus();
        }
    }

    aiSend.addEventListener('click', () => {
        const text = aiInput.value.trim();
        if (text) fetchGeminiResponse(text);
    });
    aiInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const text = aiInput.value.trim();
            if (text) fetchGeminiResponse(text);
        }
    });

    // ========== CAROUSEL LOGIKA ==========
    const GITHUB_USERNAME = 'mcpmarko83';
    const REPO_NAME = 'milosavljevic-smart-energy';
    const FOLDER_PATH = 'saradnici';
    const trackEl = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('carouselDots');
    let slides = [], currentIndex = 0, slidesPerView = 4, autoInterval = null;
    
    function updateSlidesPerView() { 
        if (window.innerWidth <= 480) slidesPerView = 1; 
        else if (window.innerWidth <= 768) slidesPerView = 2; 
        else if (window.innerWidth <= 1024) slidesPerView = 3; 
        else slidesPerView = 4; 
    }
    function renderCarousel() {
        if (!slides.length) { trackEl.innerHTML = '<div class="error" style="color:#ef4444; padding:40px; text-align:center;">Nema logotipa</div>'; return; }
        trackEl.innerHTML = slides.map(s => `<div class="carousel-slide"><div class="logo-container"><img class="partner-logo" src="${s.url}" alt="${s.name}" loading="lazy"></div><div class="partner-name">${s.name}</div></div>`).join('');
        updateCarouselPosition(); createDots();
    }
    function updateCarouselPosition() { 
        if (!slides.length) return; 
        updateSlidesPerView(); 
        const maxIdx = Math.max(0, slides.length - slidesPerView); 
        if (currentIndex > maxIdx) currentIndex = maxIdx; if (currentIndex < 0) currentIndex = 0; 
        const els = document.querySelectorAll('.carousel-slide'); 
        if (!els.length) return; 
        const w = els[0].offsetWidth; 
        trackEl.style.transform = `translateX(${-currentIndex * (w + 30)}px)`; 
        els.forEach((el, index) => { if (index === currentIndex) el.classList.add('turn-active'); else el.classList.remove('turn-active'); });
        document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentIndex));
    }
    function createDots() { 
        if (!dotsContainer) return; 
        const cnt = Math.max(1, slides.length - slidesPerView + 1); 
        dotsContainer.innerHTML = ''; 
        for(let i=0;i<cnt;i++){ 
            let d=document.createElement('div'); d.className='dot'; if(i===currentIndex) d.classList.add('active'); 
            d.addEventListener('click',()=>{ currentIndex=i; updateCarouselPosition(); resetAutoScroll(); }); 
            dotsContainer.appendChild(d); 
        } 
        dotsContainer.style.display = cnt<=1 ? 'none' : 'flex'; 
    }
    function nextSlide() { const maxIdx = Math.max(0, slides.length - slidesPerView); if(currentIndex < maxIdx) currentIndex++; else if(slides.length > slidesPerView) currentIndex = 0; updateCarouselPosition(); }
    function prevSlide() { const maxIdx = Math.max(0, slides.length - slidesPerView); if(currentIndex > 0) currentIndex--; else if(slides.length > slidesPerView) currentIndex = maxIdx; updateCarouselPosition(); }
    function startAutoScroll() { if(autoInterval) clearInterval(autoInterval); if(slides.length > slidesPerView) autoInterval = setInterval(()=>nextSlide(), 3500); }
    function resetAutoScroll() { if(autoInterval) clearInterval(autoInterval); startAutoScroll(); }
    
    document.getElementById('carousel-prev-line').addEventListener('click', () => { prevSlide(); resetAutoScroll(); });
    document.getElementById('carousel-next-line').addEventListener('click', () => { nextSlide(); resetAutoScroll(); });
    
    async function fetchLogos() { 
        try { 
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`, { headers: { 'Accept': 'application/vnd.github.v3+json' } }); 
            if(!res.ok) throw new Error('HTTP'); 
            const files = await res.json(); 
            slides = files.filter(f => /\.(jpe?g|png|gif|webp)$/i.test(f.name)).map(f => ({ name: f.name.replace(/\.[^/.]+$/, "").charAt(0).toUpperCase() + f.name.replace(/\.[^/.]+$/, "").slice(1), url: f.download_url })); 
            renderCarousel(); 
            document.querySelector('.carousel-container').onmouseenter = () => clearInterval(autoInterval); 
            document.querySelector('.carousel-container').onmouseleave = startAutoScroll; 
            window.addEventListener('resize', () => { updateCarouselPosition(); createDots(); resetAutoScroll(); }); 
            startAutoScroll(); 
        } catch(err) { trackEl.innerHTML = `<div class="error" style="color:#ef4444; padding:40px; text-align:center;">⚠️ Greška pri učitavanju partnera</div>`; } 
    }
    fetchLogos();
})();
</script>
