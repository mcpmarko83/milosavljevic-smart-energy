<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
    background-color:#04070b;
    color:#f3f4f6;
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Arial,sans-serif;
    line-height:1.6;
    overflow-x:hidden;
}

/* NEON */
.neon-text{
    color:#fff;
    text-shadow:0 0 15px rgba(76,175,80,0.5),0 0 30px rgba(76,175,80,0.2);
}

/* LOGO */
.blended-logo{
    max-width:280px;
    width:100%;
    mix-blend-mode:screen;
}

/* ================= COUNTERS ================= */
.stats-section{
    padding:70px 20px;
    text-align:center;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:20px;
}

.counter-box{
    background:rgba(13,20,30,0.6);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:18px;
    padding:25px 15px;
    backdrop-filter:blur(12px);
    transition:0.3s ease;
}

.counter-box:hover{
    transform:translateY(-5px);
    border-color:#4caf50;
    box-shadow:0 0 25px rgba(76,175,80,0.15);
}

/* iOS STYLE ICON */
.icon-ios{
    width:56px;
    height:56px;
    margin:0 auto 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    font-size:26px;
}

.counter{
    font-size:34px;
    font-weight:700;
    color:#fff;
}

.counter-box p{
    color:#9ca3af;
    font-size:12px;
    margin-top:6px;
    letter-spacing:1px;
    text-transform:uppercase;
}

/* HERO */
.hero{
    text-align:center;
    padding:90px 20px 60px;
}

.btn{
    display:inline-block;
    background:linear-gradient(135deg,#2e7d32,#4caf50);
    color:white;
    padding:14px 40px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <img src="logo.jpg" class="blended-logo">
    <h1 class="neon-text" style="margin:20px 0;font-size:38px;">
        Pametna energija za budućnost
    </h1>
    <p style="color:#9ca3af;max-width:600px;margin:0 auto 25px;">
        Elektroinstalacije, automatizacija i industrijski sistemi.
    </p>
    <a class="btn" href="#kontakt">Kontakt</a>
</section>

<!-- ================= COUNTERS SECTION ================= -->
<section class="stats-section">

    <div class="stats-grid">

        <div class="counter-box">
            <div class="icon-ios">⚡</div>
            <div class="counter" data-target="26">0</div>
            <p>Godina iskustva</p>
        </div>

        <div class="counter-box">
            <div class="icon-ios">🏗️</div>
            <div class="counter" data-target="120">0</div>
            <p>Projekata</p>
        </div>

        <div class="counter-box">
            <div class="icon-ios">🔌</div>
            <div class="counter" data-target="5000">0</div>
            <p>m kablova</p>
        </div>

        <div class="counter-box">
            <div class="icon-ios">🕒</div>
            <div class="counter" data-target="24">0</div>
            <p>7 podrška</p>
        </div>

    </div>
</section>

<!-- HERO CONTINUATION -->
<section style="text-align:center;padding:40px 20px;">
    <h2 style="color:#fff;">Inženjerska preciznost i pouzdanost</h2>
</section>

<script>
/* COUNTER ANIMATION */
function animateCounters(){
    const counters=document.querySelectorAll('.counter');

    counters.forEach(counter=>{
        const update=()=>{
            const target=+counter.getAttribute('data-target');
            const current=+counter.innerText;
            const inc=Math.ceil(target/80);

            if(current<target){
                counter.innerText=current+inc;
                setTimeout(update,30);
            }else{
                counter.innerText=target;
            }
        };
        update();
    });
}

window.addEventListener('load',animateCounters);
</script>

</body>
</html>
