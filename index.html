<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milosavljević Smart Energy | Elektroinstalacije i Automatizacija</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: #04070b; color: #f3f4f6; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif; line-height: 1.6; overflow-x: hidden; }
        .neon-text { color: #ffffff; text-shadow: 0 0 15px rgba(76, 175, 80, 0.5), 0 0 30px rgba(76, 175, 80, 0.2); }
        .hide-mobile { @media (max-width: 768px) { display: none; } }
        
        .blended-logo { max-width: 280px; width: 100%; height: auto; mix-blend-mode: screen; filter: brightness(1.1) contrast(1.05); transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .blended-logo:hover { transform: scale(1.04); }
        .blended-moto { width: 100%; height: auto; display: block; mix-blend-mode: screen; filter: brightness(1.15) drop-shadow(0 0 20px rgba(58, 134, 255, 0.25)); }
        .om-image-container { position: relative; display: inline-block; max-width: 280px; width: 100%; border-radius: 14px; overflow: hidden; background: rgba(17, 25, 40, 0.4); padding: 12px; border: 1px solid rgba(76, 175, 80, 0.15); box-shadow: 0 0 40px rgba(76, 175, 80, 0.05); }
        .blended-om { width: 100%; height: auto; display: block; mix-blend-mode: lighten; filter: contrast(1.2) brightness(1.1); }

        .grid-philosophie { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .abstract-card { background: linear-gradient(135deg, rgba(13, 20, 30, 0.7) 0%, rgba(7, 10, 15, 0.9) 100%); border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 16px; padding: 35px; position: relative; backdrop-filter: blur(16px); transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .abstract-card.full-width { grid-column: span 2; }
        .abstract-card::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: rgba(255, 255, 255, 0.05); border-radius: 16px 0 0 16px; transition: background 0.4s ease; }
        .abstract-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(76, 175, 80, 0.03); }

        .folder-box { background: rgba(13, 20, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 14px; padding: 24px; backdrop-filter: blur(8px); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .folder-arrow { transition: transform 0.3s ease; color: #4caf50; }
        .folder-box.open .folder-arrow { transform: rotate(90deg); }
        .folder-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease-out, opacity 0.3s ease-out; opacity: 0; }
        .folder-box.open .folder-content { grid-template-rows: 1fr; opacity: 1; margin-top: 18px; }
        .inner-grid { overflow: hidden; display: grid; grid-template-columns: repeat(auto-fit, minmax(115px, 1fr)); gap: 12px; }
        .project-img { width: 100%; height: 95px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.02); transition: all 0.3s ease; cursor: pointer; }
        .project-img:hover { border-color: #4caf50; transform: scale(1.04) translateY(-2px); box-shadow: 0 8px 20px rgba(76, 175, 80, 0.25); }

        .music-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #ffffff; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); transition: all 0.3s ease; }
        .music-btn:hover { background: rgba(76, 175, 80, 0.2); border-color: #4caf50; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-control { width: 100%; background: rgba(4, 7, 11, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 12px 16px; color: #ffffff; font-size: 15px; }
        .form-submit-btn { width: 100%; background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; border: none; padding: 14px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .status-box { display: none; background: rgba(76, 175, 80, 0.15); border: 1px solid #4caf50; color: #4caf50; padding: 20px; margin-top: 25px; border-radius: 12px; }

        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(3, 5, 8, 0.98); display: none; align-items: center; justify-content: center; z-index: 999999; }
        .lightbox-img { max-width: 92%; max-height: 82%; object-fit: contain; border-radius: 10px; border: 2px solid #4caf50; }
        .lightbox-close { position: absolute; top: 25px; right: 25px; color: #ffffff; font-size: 35px; cursor: pointer; background: rgba(255,255,255,0.08); width: 50px; height: 50px; text-align: center; border-radius: 50%; }

        @media (max-width: 900px) { .grid-philosophie { grid-template-columns: 1fr; } .abstract-card.full-width { grid-column: auto; } }
    </style>
</head>
<body>

    <audio id="bg-music" src="Muzika.mp3" loop></audio>
    <div id="lightbox" class="lightbox-overlay"><span class="lightbox-close" id="close-btn">&times;</span><img id="lightbox-img" class="lightbox-img" src="" alt="Uvećan prikaz"></div>

    <header style="background-color: rgba(10, 15, 24, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 14px 24px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(16px);">
        <div style="max-width:1400px; margin:0 auto; display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;">
            <p style="margin:0; font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:2px; font-weight:600;" class="hide-mobile">Tradicija od 1998.</p>
            <div style="display:flex; align-items:center; gap:14px; justify-self: center;">
                <img src="logo.jpg" alt="Milosavljević Logo" style="height:38px; width:auto; mix-blend-mode: screen;">
                <h2 style="margin:0; font-size:16px; color:#ffffff; letter-spacing:1.5px; font-weight: 700;">MILOSAVLJEVIĆ <span style="color:#4caf50;">SMART ENERGY</span></h2>
            </div>
            <button id="music-toggle" class="music-btn" style="justify-self: end;"><span id="music-icon">🔊</span> <span id="music-text" class="hide-mobile">Muzika: Isključena</span></button>
        </div>
    </header>

    <div style="max-width:1200px; margin:0 auto; padding:0 20px;">
        <section style="padding:90px 0 70px 0; text-align:center;">
            <img src="logo.jpg" alt="Logo" class="blended-logo" style="margin-bottom:30px;">
            <h1 class="neon-text" style="font-size:40px; margin:20px 0;">Inženjerska tradicija za <span style="color:#3a86ff;">pametnu budućnost</span></h1>
            <a href="#kontakt" style="display:inline-block; background:linear-gradient(135deg, #2e7d32, #4caf50); color:white; padding:14px 45px; border-radius:30px; text-decoration:none; font-weight:600;">Kontaktirajte Nas</a>
        </section>

        <!-- REFERENCE SEKCIJA SA NOVIM IKONAMA -->
        <section style="padding:40px 0;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
                <!-- PRIMJER JEDNOG FOLDERA (Ponavljaš ovo za ostale) -->
                <div class="folder-box">
                    <div onclick="toggleFolder(this.parentNode)" style="display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            <h3 style="color:#ffffff; font-size:17px;">Kućne instalacije</h3>
                        </div>
                        <span class="folder-arrow">▶</span>
                    </div>
                    <div class="folder-content">
                        <div class="inner-grid">
                            <img src="Nasi projekti/01_Kucne_instalacije/1.jpg" class="project-img">
                            <img src="Nasi projekti/01_Kucne_instalacije/2.jpg" class="project-img">
                        </div>
                    </div>
                </div>
                <!-- Dodaj ostale foldere po istom principu -->
            </div>
        </section>

        <section id="kontakt" style="padding:60px 0; max-width:750px; margin:0 auto;">
            <h2 style="color:#ffffff; margin-bottom:25px; text-align:center;">Kontakt</h2>
            <form id="clean-contact-form" style="background: rgba(13, 20, 30, 0.6); padding:40px; border-radius:16px;">
                <h3 id="form-title" style="color: #ffffff; margin-bottom: 20px;">Pošaljite nam upit direktno sa sajta</h3>
                <input type="text" id="ins_name" class="form-control" placeholder="Ime i prezime" required style="margin-bottom:15px;">
                <input type="tel" id="ins_phone" class="form-control" placeholder="Telefon" required style="margin-bottom:15px;">
                <input type="email" id="ins_email" class="form-control" placeholder="Email" required style="margin-bottom:15px;">
                <textarea id="ins_message" class="form-control" rows="5" placeholder="Poruka" required style="margin-bottom:15px;"></textarea>
                <button type="submit" id="submit-btn" class="form-submit-btn">🚀 Pošalji poruku</button>
            </form>
            <div id="status-box" class="status-box">✅ <strong>Uspješno poslato!</strong><br><br>Zahvaljujemo Vam se na javljanju. Kontaktiraćemo Vas u najkraćem roku.</div>
        </section>
    </div>

    <script>
        function toggleFolder(el) { el.classList.toggle('open'); }
        
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');

        document.querySelectorAll('.project-img').forEach(img => {
            img.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                lightboxImg.src = this.src; lightbox.classList.add('active');
            });
        });

        lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

        document.getElementById('clean-contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Slanje..."; btn.disabled = true;
            fetch('https://formsubmit.co/ajax/milosavljevic@outlook.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "Ime": document.getElementById('ins_name').value,
                    "Telefon": document.getElementById('ins_phone').value,
                    "Email": document.getElementById('ins_email').value,
                    "Poruka": document.getElementById('ins_message').value
                })
            }).then(() => {
                document.getElementById('clean-contact-form').style.display = 'none';
                document.getElementById('form-title').innerText = "Informacija pošiljaocu";
                document.getElementById('status-box').style.display = 'block';
            });
        });
    </script>
</body>
</html>
