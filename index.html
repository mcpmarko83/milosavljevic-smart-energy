<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        /* ==========================================================================
           1. CORE SETTINGS & NEON MATRIX (Reset i Globalni Stilovi)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #04070b;
            color: #f3f4f6;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Tipografski neonski akcenti */
        .neon-text {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(76, 175, 80, 0.5), 0 0 30px rgba(76, 175, 80, 0.2);
        }
        .hide-mobile {
            @media (max-width: 768px) { display: none; }
        }

        /* ==========================================================================
           2. PREMIUM REZULTATI STAPANJA SLIKA (Estetika bez oštrih ivica)
           ========================================================================== */
        .blended-logo {
            max-width: 280px;
            width: 100%;
            height: auto;
            mix-blend-mode: screen;
            filter: brightness(1.1) contrast(1.05);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .blended-logo:hover {
            transform: scale(1.04);
        }
        .blended-moto {
            width: 100%;
            height: auto;
            display: block;
            mix-blend-mode: screen;
            filter: brightness(1.15) drop-shadow(0 0 20px rgba(58, 134, 255, 0.25));
        }
        .om-image-container {
            position: relative;
            display: inline-block;
            max-width: 280px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(17, 25, 40, 0.4);
            padding: 12px;
            border: 1px solid rgba(76, 175, 80, 0.15);
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.05); 
        }
        .blended-om {
            width: 100%;
            height: auto;
            display: block;
            mix-blend-mode: lighten;
            filter: contrast(1.2) brightness(1.1);
        }

           3. INTERAKTIVNE KARTICE (Asimetrična arhitektura i 3D efekat)
           ========================================================================== */
        .grid-philosophie {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .abstract-card {
            background: linear-gradient(135deg, rgba(13, 20, 30, 0.7) 0%, rgba(7, 10, 15, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 35px;
            position: relative;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .abstract-card.full-width {
            grid-column: span 2;
        }
        .abstract-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px 0 0 16px;
            transition: background 0.4s ease;
        }
