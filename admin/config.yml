backend:
  name: github
  repo: mcpmarko83/milosavljevic-smart-energy/ # PRIMJER: marko/mse-digital-hub
  branch: main
  base_url: https://milosavljevic-smart-energy.pages.dev/

media_folder: "Nasi projekti/uploads"
public_folder: "/Nasi projekti/uploads"

collections:
  - name: "portfolio"
    label: "MSE Projekti i Reference"
    files:
      - label: "Svi Projekti (Folderi)"
        name: "projekti"
        file: "podaci/projekti.json"
        fields:
          - label: "Lista Vaših Foldera"
            name: "lista"
            widget: "list"
            fields:
              - {label: "Naziv foldera (npr. 01 Kućne instalacije)", name: "title", widget: "string"}
              - {label: "Kratki opis", name: "opis", widget: "string"}
              - {label: "Boja foldera (hex kod)", name: "boja", widget: "string", default: "#4caf50"}
              - {label: "Putanja do slika (Ime foldera sa slikama)", name: "folder_path", widget: "string"}
